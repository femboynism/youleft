name: Build and deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Prepare environment
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build plugin(s)
        run: node ./build.mjs

      - name: Debug dist (before copy)
        run: ls -R

      - name: Ensure dist exists
        run: mkdir -p dist

      # 🔥 IMPORTANT: copy manifest from template → dist
      - name: Copy manifest
        run: cp template/manifest.json dist/manifest.json

      - name: Copy additional files
        run: |
          cp README.md dist/README.md

          printf -- "---\npermalink: /404.html\n---\n" > dist/404.md
          printf -- "> 404 fallback page\n\n" >> dist/404.md
          cat README.md >> dist/404.md

      - name: Debug dist (after copy)
        run: ls -R dist

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          enable_jekyll: false
